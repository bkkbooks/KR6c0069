body:
  text: 明觀衡撰金剛般若波羅蜜經此八字乃一經之總題金剛是喻即金剛寶最堅萬物不能壞最利能壞一切物般若是法梵語般若此云智慧此慧之體本寂即實相般若此慧之用圓明即觀照般若實相之體生死等法不能到故喻之金剛最堅一切物不能壞觀照之用能空生死等法故喻之金剛最利能壞一切物此金剛般若在大部中名能斷分則知今喻金剛唯重能利能空一切法也此經從須菩提啟請已去至後不取於相如如不動通是用觀照般若之法不取心佛眾生之相又照心佛眾生無性又照心佛眾生本寂成一清淨菩提心然現前心佛眾生有實體用如何得知無性本寂而不取耶後以金剛觀察深喻喻之心佛眾生皆是有為如夢幻泡影則心佛眾生諸法不待排遣而自空矣既是本空本寂欲何所取是知行般若時只是一味不取則世出世法一無所有也又諸法不是因不取而後無唯其本無因妄取成有但不取自還本來面目是則金剛之名即夢幻等喻以夢幻等喻喻空一切法故稱金剛喻經中先法後喻題中先喻後法首楞嚴經云金剛王寶覺如幻三摩提如幻即金剛也三摩提寶覺即般若也波羅蜜此云彼岸到即到彼岸以梵語多倒故葢般若乃諸佛眾生共有之佛性眾生不善用用之見色為色粘用之聞聲為聲轉不能超聲色之外逐境流轉名為此岸諸佛善用此佛性用之照色色空用之照聲聲寂能超聲色之外達境唯心名為彼岸是此岸彼岸非有兩地同是一境但超與不超名為此岸彼岸是轉名不轉體也般若妄見亦只一佛性因覺不覺故別其名亦無實性也經之一字即文句之假名以貫攝為義是能詮言教即文字般若也依相言則有喻有法有體有用差別名義合之故曰金剛般若波羅蜜經依性言唯一如如不動清淨菩提心了無能所法喻體用之分也此金剛般若經一卷雖文義重沓總不出須菩提所讚所請之義所讚如來善護念諸菩薩善囑所諸菩薩所請善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心是也如來所答先總答菩提心以酬所請之意然後展轉發明使其信受清淨即見所讚不虗也先總答菩提心從佛告須菩提諸菩薩摩訶薩應如是降伏其心起至須菩提菩薩但應如所教住止是也其中初答降伏其心即發起大悲能降伏我心以大悲能度一切眾生若無智運之即墮生死故以智運之雖是滅度無量無數眾生實無眾生得滅度者何以故下徵明其義若菩薩有我相人相眾生相壽者相即非菩薩是悲不離智也次答云何應住即發起大智於一切法應無所住以無所住能遠離一切相若無悲運之即墮涅槃故以悲運之雖是不住於相而行布施饒益眾生下徵明其義謂何故既行布施又不住於相葢菩薩不住相布施其福德方是無漏猶如虗空廣大不可思量故也後結答須菩提問意謂汝問發菩提心云何應住菩薩發菩提心但應如我所教而住是真實菩薩是真實阿耨多羅三藐三菩提心是知菩提心無別自體唯悲智和合故名菩提心又大悲降伏我心即不取心相大智不住一切法即不取眾生佛之相既不取心佛眾生三相是三相無有差別同一清淨菩提心也上既總答菩提心行相如此下為發明以見如來護念付囑菩薩之善巧因總標菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施雖分示六塵之法未指陳六塵之法所在何處故下為指明六塵在處即佛與眾生也既六塵通該佛與眾生不住六塵即不住佛相眾生相不住即不取也不取佛相即不取樂相不取出世間法相不取眾生相即不取苦相不取世間法相從須菩提於意云何可以身相見如來不起至後須菩提當知是經義不可思議果報亦不可思議止是也其中先不住佛相佛有福慧二相從須菩提於意云何可以身相見如來不起至如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法止是不住佛福相即不取福果也從須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶起至須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法是名佛法止是不住佛慧相即不取智果也上護念菩薩不取如來福慧二果恐疑謂發菩提心為求菩提道今於佛福慧二相都不取即菩提道亦無何用發菩提心耶故下引四果及佛菩薩皆以不取而後證果因不取福慧二相其福慧乃能廣大無漏若取相即屬有漏非菩提心也初引聲聞不取四果次引如來不取菩提後引菩薩不取莊嚴然後結成以一切聖賢都是不取而後證果是故菩薩發菩提心亦應如是生清淨心不應住色生心不應住聲香味觸法生心即不應住如來福慧二相生心應無所住而生其心是真清淨心也文從須菩提於意云何須陀洹能作是念我得須陀洹果不起至佛說非身是名大身止是也上開示結成以不取為菩提心既明矣即付囑信受使傳持佛慧命相續不斷文從須菩提如恒河中所有沙數如是沙等恒河於意云何是諸恒河沙寧為多不起至若是經典所在之處即為有佛若尊重弟子止是也此經是頓教不歷修證漸次隨分一字一句義皆圓滿故即請經名文從爾時須菩提白佛言世尊當何名此經起至若復有人於此經中乃至受持四句偈等為他人說其福甚多止是也上發明證成付囑此菩提心了然明白當機領解陳自所解如來復為印證又從爾時須菩提聞說是經深解義趣涕淚悲泣起至如來說第一波羅蜜即非第一波羅蜜是名第一波羅蜜止是也已上護念付囑總是護念菩提心不住如來福慧二相下護念菩提心不住眾生相從須菩提忍辱波羅蜜如來說非忍辱波羅蜜是名忍辱波羅蜜起至如人有目日光明照見種種色止是護念不住眾生相又從須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德起至當知是經義不可思議果報亦不可思議是付囑此不住眾生相清淨菩提心使傳佛慧命也上發明菩提心不取佛不取眾生清淨行相意義已周恐疑謂菩提心要上求佛果下利眾生乃成菩提心何故教佛與眾生皆不可取若不取佛與眾生則菩提心云何而生耶是教離相發菩提心則無菩提心可發矣故須菩提重復請問善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心前問云何應住云何降伏其心意謂發菩提心降伏何等心故曰云何降伏其心住於何法故曰云何應住如來答意謂發菩提心應降伏我心應住於無相是清淨菩提心今問云何應住謂菩提心要借外緣而生云何應於無相而住又菩提心要借內因而生云何降伏我心若無內因外緣則菩提心無因而生矣是前後問辭似同問意迥別下如來所答亦是辭同意別經云佛告須菩提善男子善女人發阿耨多羅三藐三菩提心當生如是心此句是總答謂發菩提心當要生如是清淨心內降伏我心外不住生佛名相此重一當字謂當要生如是清淨心方名菩提心也故云我應滅度一切眾生已而無有一眾生實滅度者又釋明其義經云所以者何實無有法發阿耨多羅三藐三菩提心者以實無有法一句釋明當如是生清淨心謂若實有法如來何故強要汝等不取以實無有法眾生妄見內取心相外取生佛之相故成迷倒汝若不取即正知見故名菩提心是以實無有法為正理以不取內心內因正不取生佛之相外緣正因緣既正能生正智故名菩提心是則一有所取即背正理所生皆顛倒見非菩提心故發菩提心者應如是住如是降伏其心上答明其意下引證從須菩提於意云何如來於燃燈佛所有法得阿耨多羅三藐三菩提不起至須菩提若菩薩通達無我法者如來說名真是菩薩止是以如來實無有法得成菩提菩薩實無有法莊嚴佛土證成菩薩應如是不住於相應如是降伏我心是名真發菩提心也上以實無有法一句總答明菩提心應住降伏之義未詳明實無有法是實無何等法故下廣明實無有法之法字從須菩提於意云何如來有肉眼不起至須菩提菩薩所作福德不應貪著是故說不受福德止通是廣明實無有法之義以心佛眾生諸法既都實無所有則了無一法可取即達清淨實相以顯如來護念之善也其中初明心無我文從須菩提於意云何如來有肉眼不起至須菩提過去心不可得現在心不可得未來心不可得止是也又從須菩提於意云何若有人滿三千大千世界七寶以用布施起至後若有人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及止是明佛無我也其中初從須菩提於意云何若人滿三千大千世界七寶以用布施起至得福德多是明佛福因性無我又從須菩提於意云何佛可以具足色身見不起至是名諸相具足止是明佛福果性無我總此二章通是明佛福性無我又從須菩提汝勿作是念我當有所說法起至如來說非眾生是名眾生止是明佛智所說法無我又從須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶起至如來說善法即非善法是名善法止是明佛智所證法無我通此二章是明佛智性無我并前福性無我是護念菩提心實無有佛可取也既護念不取佛福慧二嚴其心清淨後付囑生信受持故云須菩提若三千大千世界中所有諸須彌山王等又從須菩提於意云何汝等勿謂如來作是念我當度眾生起至凡夫者如來說即非凡夫是名凡夫止是明眾生無我上歷明心佛眾生三法皆實無有是正明實無有法護念菩提心不應取法不應取非法故得清淨但未知有法發心有何過若有法發心無過即依有法發心亦可何故必竟要依實無有法發心耶故下以有相見佛為非反成上實無有法發心為決定義經從須菩提於意云何可以三十二相觀如來不起至是人行邪道不能見如來止是也上來證明反成總明心佛眾生三法實無所有以破執實有我法之常見又恐執實無有法不作福德成斷滅見故下又破撥無因果之斷見并上破常見通是於心佛眾生三法上遠離斷常二見成就無上正等正覺之心此破斷見之文從須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提若作是念起至是故說不受福德止是也前從須菩提於意云何可以身相見如來不起至是經義不可思議果報亦不可思議通是破徧計性遣人法二執以不取心佛眾生等法護念菩提心清淨離相從須菩提重請善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心起至是故說不受福德通是破因緣性明人法無我以明心佛眾生三法無性是菩提理趣以理趣本無一法成上菩提心行相應不住不取也既實無心佛眾生了無一法可得即真清淨事事法法同一如如不動故示圓成性以明人法一如從須菩提若有人言如來若來若去若坐若臥是人解我所說義不起至但凡夫之人貪著其事止是顯圓成性如如之理其中初以如來若來若去明法性身如次以世界微塵無成壞相明法性土如身土一如即如如體從須菩提若人言佛說我見人見眾生見壽者見起至一切有為法如夢幻泡影如露亦如電應作如是觀止是明圓成性正智之照其中初明現量智從須菩提若人言佛說我見人見起至於一切法應如是知如是見如是信解不生法相止是也如是知如是見如是信解即如來現量正知正見是究竟菩提心次明比量智從須菩提若有人以滿無量阿僧祇世界起至後應作如是觀止此用金剛觀察十種深喻比心佛眾生有為諸法如夢幻泡影了無實性以喻比觀故名比量觀察入理故名正觀以正觀之比智合上正智之現智通是如如全體大用是前破徧計性遠離人法二執成就正智之大用又破因緣性通達人法無我顯說如如之本體是合如如正智為圓成性分圓成性為實相觀照二種般若是圓成性遠離徧計成就正智遠離因緣成就如如即如如正智合為一阿耨多羅三藐三菩提心也此經大旨盡於此矣是知此經始終只是一阿耨多羅三藐三菩提心如來善護念善付囑只是成就得一發字已發者護念發起清淨心未發者付囑發起信受此就多分言已發方堪付囑未發更要護念總之要成就一發字是佛善巧也
